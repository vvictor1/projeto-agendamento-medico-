version: '3.8'
services:
 
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq_hospital
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - hospital_net

  servico-agenda:
    build: ./Servico-agenda
    container_name: servico_agenda
    depends_on:
      - rabbitmq
    networks:
      - hospital_net

  servico-notificacao:
    build: ./Servico-notificacao
    container_name: servico_notificacao
    depends_on:
      - rabbitmq
    networks:
      - hospital_net

networks:
  hospital_net:
    driver: bridge